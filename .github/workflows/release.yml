name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK to include release tag
        id: apk
        run: |
          name="digger-android-${GITHUB_REF_NAME}.apk"
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/$name"
          echo "path=app/build/outputs/apk/release/$name" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: digger-android-${{ github.ref_name }}
          path: ${{ steps.apk.outputs.path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
